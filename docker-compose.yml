version: '3.9'

services:
  # =========================================================================
  # Infrastructure
  # =========================================================================
  postgres:
    image: postgres:16-alpine
    container_name: fifa-nexus-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-fifa_nexus}
      POSTGRES_USER: ${POSTGRES_USER:-nexus_admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-nexus_secure_2026}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/seed-database.sql:/docker-entrypoint-initdb.d/01-seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-nexus_admin} -d ${POSTGRES_DB:-fifa_nexus}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  redis:
    image: redis:7-alpine
    container_name: fifa-nexus-redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-nexus_redis_2026} --maxmemory 256mb --maxmemory-policy allkeys-lru
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-nexus_redis_2026}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - nexus-network

  # =========================================================================
  # Microservices
  # =========================================================================
  wayfinding:
    build:
      context: .
      dockerfile: services/wayfinding/Dockerfile
    container_name: fifa-nexus-wayfinding
    ports:
      - "${WAYFINDING_PORT:-8001}:8001"
    environment:
      - SERVICE_NAME=wayfinding
      - SERVICE_PORT=8001
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-fifa_nexus}
      - POSTGRES_USER=${POSTGRES_USER:-nexus_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_secure_2026}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexus_redis_2026}
      - JWT_SECRET=${JWT_SECRET:-fifa-nexus-jwt-secret-2026-change-in-production}
      - JWT_ALGORITHM=HS256
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus-network

  crowd-management:
    build:
      context: .
      dockerfile: services/crowd-management/Dockerfile
    container_name: fifa-nexus-crowd-management
    ports:
      - "${CROWD_MGMT_PORT:-8002}:8002"
    environment:
      - SERVICE_NAME=crowd-management
      - SERVICE_PORT=8002
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-fifa_nexus}
      - POSTGRES_USER=${POSTGRES_USER:-nexus_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_secure_2026}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexus_redis_2026}
      - JWT_SECRET=${JWT_SECRET:-fifa-nexus-jwt-secret-2026-change-in-production}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus-network

  fan-assistance:
    build:
      context: .
      dockerfile: services/fan-assistance/Dockerfile
    container_name: fifa-nexus-fan-assistance
    ports:
      - "${FAN_ASSIST_PORT:-8003}:8003"
    environment:
      - SERVICE_NAME=fan-assistance
      - SERVICE_PORT=8003
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DB=${POSTGRES_DB:-fifa_nexus}
      - POSTGRES_USER=${POSTGRES_USER:-nexus_admin}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-nexus_secure_2026}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-nexus_redis_2026}
      - JWT_SECRET=${JWT_SECRET:-fifa-nexus-jwt-secret-2026-change-in-production}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.5-pro}
      - CORS_ORIGINS=${CORS_ORIGINS:-http://localhost:3000,http://localhost:8080}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    networks:
      - nexus-network

volumes:
  postgres_data:
  redis_data:

networks:
  nexus-network:
    driver: bridge
