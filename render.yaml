services:
  # =========================================================================
  # Redis Key Value Store
  # =========================================================================
  - type: keyvalue
    name: fifa-nexus-redis
    plan: free
    ipAllowList: []

  # =========================================================================
  # Wayfinding Service (FastAPI)
  # =========================================================================
  - type: web
    name: fifa-nexus-wayfinding
    env: docker
    plan: free
    dockerfilePath: services/wayfinding/Dockerfile
    dockerContext: .
    envVars:
      - key: SERVICE_NAME
        value: wayfinding
      - key: SERVICE_PORT
        value: "8001"
      - key: PORT
        value: "8001"
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fifa-nexus-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        value: fifa-nexus-jwt-secret-2026-change-in-production
      - key: JWT_ALGORITHM
        value: HS256
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: info

  # =========================================================================
  # Crowd Management Service (Express + WebSocket)
  # =========================================================================
  - type: web
    name: fifa-nexus-crowd-management
    env: docker
    plan: free
    dockerfilePath: services/crowd-management/Dockerfile
    dockerContext: .
    envVars:
      - key: SERVICE_NAME
        value: crowd-management
      - key: SERVICE_PORT
        value: "8002"
      - key: PORT
        value: "8002"
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fifa-nexus-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        value: fifa-nexus-jwt-secret-2026-change-in-production
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: info

  # =========================================================================
  # Fan Assistance Service (Apollo GraphQL)
  # =========================================================================
  - type: web
    name: fifa-nexus-fan-assistance
    env: docker
    plan: free
    dockerfilePath: services/fan-assistance/Dockerfile
    dockerContext: .
    envVars:
      - key: SERVICE_NAME
        value: fan-assistance
      - key: SERVICE_PORT
        value: "8003"
      - key: PORT
        value: "8003"
      - key: DATABASE_URL
        fromDatabase:
          name: fifa-nexus-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: fifa-nexus-redis
          type: keyvalue
          property: connectionString
      - key: JWT_SECRET
        value: fifa-nexus-jwt-secret-2026-change-in-production
      - key: GEMINI_API_KEY
        sync: false # User will input their own Gemini API key in the Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.5-pro
      - key: CORS_ORIGINS
        value: "*"
      - key: LOG_LEVEL
        value: info

  # =========================================================================
  # Static Frontend Demo
  # =========================================================================
  - type: web
    name: fifa-nexus-frontend
    env: static
    plan: free
    publishPath: public
    buildCommand: ""

databases:
  # =========================================================================
  # PostgreSQL Database
  # =========================================================================
  - name: fifa-nexus-postgres
    databaseName: fifa_nexus
    user: nexus_admin
    plan: free
    postgresMajorVersion: "16"
