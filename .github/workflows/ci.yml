name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  wayfinding:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r services/wayfinding/requirements.txt
          pip install ruff pytest pytest-asyncio pytest-cov black
      - name: Lint with Ruff
        run: ruff check services/wayfinding
      - name: Check format with Black
        run: black --check services/wayfinding
      - name: Run tests with Pytest
        run: |
          cd services/wayfinding
          pytest

  shared-contracts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: shared/contracts/package-lock.json
      - name: Install dependencies
        run: |
          cd shared/contracts
          npm ci
      - name: Build contracts
        run: |
          cd shared/contracts
          npm run build

  crowd-management:
    runs-on: ubuntu-latest
    needs: shared-contracts
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/crowd-management/package-lock.json
      - name: Install dependencies
        run: |
          cd services/crowd-management
          npm ci
      - name: Build shared contracts
        run: |
          cd shared/contracts
          npm ci
          npm run build
      - name: Run ESLint
        run: |
          cd services/crowd-management
          npm run lint
      - name: Run Prettier check
        run: |
          cd services/crowd-management
          npm run format:check
      - name: Compile/Type-check
        run: |
          cd services/crowd-management
          npx tsc --noEmit
      - name: Run Jest tests
        run: |
          cd services/crowd-management
          npm test

  fan-assistance:
    runs-on: ubuntu-latest
    needs: shared-contracts
    steps:
      - uses: actions/checkout@v4
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: services/fan-assistance/package-lock.json
      - name: Install dependencies
        run: |
          cd services/fan-assistance
          npm ci
      - name: Build shared contracts
        run: |
          cd shared/contracts
          npm ci
          npm run build
      - name: Run ESLint
        run: |
          cd services/fan-assistance
          npm run lint
      - name: Run Prettier check
        run: |
          cd services/fan-assistance
          npm run format:check
      - name: Compile/Type-check
        run: |
          cd services/fan-assistance
          npx tsc --noEmit
      - name: Run Jest tests
        run: |
          cd services/fan-assistance
          npm test
